apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: my-app-dev

resources:
- ../../base

# Image avec tag de dev
images:
- name: VOTRE_USERNAME_DOCKERHUB/my-laravel-app
  newTag: "dev"

# Patch : 1 seul replica en dev pour économiser les ressources
patches:
- target:
    kind: Deployment
    name: my-app
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1

# Surcharge de config pour l'environnement dev
configMapGenerator:
- name: my-app-config
  behavior: merge
  literals:
  - APP_ENV=local
  - APP_DEBUG=true
  - APP_URL=http://my-app-dev.3.252.136.48.nip.io
