apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: my-app

resources:
- ../../base

# Image avec tag de production spécifique
images:
- name: VOTRE_USERNAME_DOCKERHUB/my-laravel-app
  newTag: "latest"

# Patch : 3 replicas en production
patches:
- target:
    kind: Deployment
    name: my-app
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
- target:
    kind: Deployment
    name: my-app
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: "256Mi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: "1Gi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: "200m"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: "1000m"

# Surcharge de config pour la production
configMapGenerator:
- name: my-app-config
  behavior: merge
  literals:
  - APP_ENV=production
  - APP_DEBUG=false
  - APP_URL=http://my-app.3.252.136.48.nip.io
