apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "my-laravel-app.fullname" . }}-config
  labels:
    {{- include "my-laravel-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
data:
  APP_NAME: {{ .Values.app.name | quote }}
  APP_ENV: {{ .Values.app.env | quote }}
  APP_DEBUG: {{ .Values.app.debug | quote }}
  APP_URL: {{ .Values.app.url | quote }}
  DB_CONNECTION: "mysql"
  DB_HOST: {{ printf "%s-mysql" .Release.Name | quote }}
  DB_PORT: "3306"
  DB_DATABASE: {{ .Values.database.name | quote }}
  DB_USERNAME: {{ .Values.database.username | quote }}
  LOG_CHANNEL: "stderr"
  CACHE_DRIVER: "file"
  SESSION_DRIVER: "file"
  QUEUE_CONNECTION: "sync"
