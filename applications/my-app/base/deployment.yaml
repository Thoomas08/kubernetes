apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: kubequest
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: my-app
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-app
        app.kubernetes.io/component: app
    spec:
      initContainers:
      - name: wait-for-db
        image: mysql:8.0
        command:
        - sh
        - -c
        - |
          echo "Attente que MySQL soit pret..."
          until mysqladmin ping -h mysql -u root -p"${DB_ROOT_PASSWORD}" --silent; do
            echo "MySQL pas encore pret, nouvelle tentative dans 3s..."
            sleep 3
          done
          echo "MySQL est pret !"
        env:
        - name: DB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: my-app-secret
              key: DB_ROOT_PASSWORD
      - name: run-migrations
        image: VOTRE_USERNAME_DOCKERHUB/my-laravel-app:latest
        command: ["php", "artisan", "migrate", "--force"]
        envFrom:
        - configMapRef:
            name: my-app-config
        - secretRef:
            name: my-app-secret
      containers:
      - name: app
        image: VOTRE_USERNAME_DOCKERHUB/my-laravel-app:latest
        ports:
        - name: http
          containerPort: 80
        envFrom:
        - configMapRef:
            name: my-app-config
        - secretRef:
            name: my-app-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - my-app
              topologyKey: kubernetes.io/hostname