apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: kubequest
    app.kubernetes.io/managed-by: kustomize
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: my-app
            app.kubernetes.io/component: backup
        spec:
          containers:
          - name: mysql-backup
            image: mysql:8.0
            command:
            - /bin/sh
            - -c
            - |
              BACKUP_FILE="/backup/backup-$(date +%Y%m%d-%H%M%S).sql"
              echo "Demarrage du backup..."
              mysqldump -h mysql -u root -p"${DB_ROOT_PASSWORD}" "${DB_DATABASE}" > "${BACKUP_FILE}"
              echo "Backup termine : ${BACKUP_FILE}"
              ls -lh /backup/
            env:
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: my-app-config
                  key: DB_DATABASE
            - name: DB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-app-secret
                  key: DB_ROOT_PASSWORD
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "200m"
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
          volumes:
          - name: backup-storage
            emptyDir: {}
          restartPolicy: OnFailure
