apiVersion: v1
kind: ConfigMap
metadata:
  name: my-app-config
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: kubequest
    app.kubernetes.io/managed-by: kustomize
data:
  APP_NAME: "MyApp"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "http://my-app.3.252.136.48.nip.io"
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "app_database"
  DB_USERNAME: "app_user"
  LOG_CHANNEL: "stderr"
  CACHE_DRIVER: "file"
  SESSION_DRIVER: "file"
  QUEUE_CONNECTION: "sync"
