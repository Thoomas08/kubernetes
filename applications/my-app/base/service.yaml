apiVersion: v1
kind: Service
metadata:
  name: my-app
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: kubequest
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: app
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP